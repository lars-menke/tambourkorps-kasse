<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>TK Kasse</title>
  <script>
    // SPA redirect for GitHub Pages — rafgraph/spa-github-pages pattern
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 2).join('/')
      + '/?p=' + l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~')
      + (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '')
      + l.hash
    );
  </script>
</head>
</html>
