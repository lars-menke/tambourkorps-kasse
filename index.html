    <link rel="apple-touch-icon" href="/tambourkorps-kasse/apple-touch-icon.png" />
    <title>TambourWallet</title>
    <script>
      // SPA redirect decode — rafgraph/spa-github-pages pattern
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded[0]
            + (decoded[1] ? '?' + decoded[1] : '')
            + l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
